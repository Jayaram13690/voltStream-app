services:
  backend:
    build:
      context: ./backend
    environment:
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8081,http://127.0.0.1:8081,http://localhost
    ports:
      - "8081:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8081
    ports:
      - "8080:80"
    depends_on:
      - backend